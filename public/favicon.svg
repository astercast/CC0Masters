<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <rect width="32" height="32" fill="#050a05"/>
  <!-- Outer border -->
  <rect x="1" y="1" width="30" height="30" fill="none" stroke="#2d6b1a" stroke-width="1"/>
  <!-- Corner brackets -->
  <rect x="2" y="2" width="4" height="1" fill="#52b52e"/>
  <rect x="2" y="2" width="1" height="4" fill="#52b52e"/>
  <rect x="26" y="2" width="4" height="1" fill="#52b52e"/>
  <rect x="29" y="2" width="1" height="4" fill="#52b52e"/>
  <rect x="2" y="29" width="4" height="1" fill="#52b52e"/>
  <rect x="2" y="26" width="1" height="4" fill="#52b52e"/>
  <rect x="26" y="29" width="4" height="1" fill="#52b52e"/>
  <rect x="29" y="26" width="1" height="4" fill="#52b52e"/>
  <!-- "C" letter - pixel art -->
  <rect x="5" y="10" width="6" height="2" fill="#a8ff40"/>
  <rect x="5" y="10" width="2" height="12" fill="#a8ff40"/>
  <rect x="5" y="20" width="6" height="2" fill="#a8ff40"/>
  <!-- "0" letter -->
  <rect x="13" y="10" width="6" height="2" fill="#7ee832"/>
  <rect x="13" y="10" width="2" height="12" fill="#7ee832"/>
  <rect x="17" y="10" width="2" height="12" fill="#7ee832"/>
  <rect x="13" y="20" width="6" height="2" fill="#7ee832"/>
  <!-- Scanline effect -->
  <rect x="2" y="8" width="28" height="1" fill="#0a1209" opacity="0.6"/>
  <rect x="2" y="14" width="28" height="1" fill="#0a1209" opacity="0.6"/>
  <rect x="2" y="18" width="28" height="1" fill="#0a1209" opacity="0.6"/>
  <rect x="2" y="24" width="28" height="1" fill="#0a1209" opacity="0.6"/>
  <!-- Glow dots -->
  <rect x="21" y="10" width="2" height="2" fill="#c8ff50" opacity="0.8"/>
  <rect x="24" y="13" width="2" height="2" fill="#7ee832" opacity="0.6"/>
  <rect x="21" y="16" width="2" height="2" fill="#52b52e" opacity="0.5"/>
  <rect x="24" y="19" width="2" height="2" fill="#7ee832" opacity="0.6"/>
  <rect x="21" y="22" width="2" height="2" fill="#c8ff50" opacity="0.8"/>
</svg>
